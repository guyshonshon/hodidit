name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Backend — lint (ruff)
        working-directory: backend
        run: pip install ruff && ruff check app/

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend — install & build
        working-directory: frontend
        run: npm ci && npm run build

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        env:
          AWS_REGION: eu-west-1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Wait for SSM online
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          for i in $(seq 1 36); do
            PING=$(aws ssm describe-instance-information \
              --region eu-west-1 \
              --filters Key=InstanceIds,Values="$INSTANCE_ID" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>/dev/null || true)
            echo "attempt=$i ssm_ping=$PING"
            if [ "$PING" = "Online" ]; then
              exit 0
            fi
            sleep 5
          done
          echo "SSM is not Online for instance $INSTANCE_ID"
          exit 1

      - name: Deploy via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          REMOTE='sudo -iu ubuntu bash -lc "set -euo pipefail
          cd /opt/devops-solver
          git fetch origin
          git checkout main
          git pull --ff-only origin main
          docker compose -f docker-compose.prod.yml up -d --build >/tmp/deploy.log 2>&1 \
            || { tail -n 120 /tmp/deploy.log; exit 1; }
          if [ -x deploy/install_runtime_guard.sh ]; then
            deploy/install_runtime_guard.sh >>/tmp/deploy.log 2>&1 || true
          fi
          tail -n 60 /tmp/deploy.log
          docker compose -f docker-compose.prod.yml ps"'

          PARAMS=$(jq -cn --arg c "$REMOTE" '{commands:[$c]}')

          COMMAND_ID=$(aws ssm send-command \
            --region eu-west-1 \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "hodidit deploy ${{ github.sha }}" \
            --parameters "$PARAMS" \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM command: $COMMAND_ID"

          STATUS=""
          for _ in $(seq 1 120); do
            STATUS=$(aws ssm get-command-invocation \
              --region eu-west-1 \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            case "$STATUS" in
              Success|Failed|TimedOut|Cancelled|Undeliverable|Terminated) break ;;
            esac
            sleep 5
          done

          aws ssm get-command-invocation \
            --region eu-west-1 \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
            --output json

          [ "$STATUS" = "Success" ] || { echo "Deploy failed — status: $STATUS"; exit 1; }
