services:
  backend:
    build: ./backend
    container_name: hodidit-backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - playwright-cache:/ms-playwright
    environment:
      - DATABASE_URL=sqlite:////app/data/devops_solver.db
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_BUILD_NUMBER=${BUILD_NUMBER:-dev}
    container_name: hodidit-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"

  # Cloudflare tunnel (optional — needs TUNNEL_TOKEN in .env)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: hodidit-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - frontend
    profiles: ["tunnel"]

volumes:
  playwright-cache:
